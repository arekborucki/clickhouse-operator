StylesPath = docs/styles

Vocab = ClickHouse

# Treat .mdx as markdown
[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Vale
Vale.Spelling = YES
Vale.Terms = YES
Vale.Repetition = YES
Vale.Passive = YES
Vale.Readability = YES
# Skip MDX heading-anchor IDs ({#some-id}) — they're lowercase by convention, not subject to Terms casing rules.
TokenIgnores = (\{#[^}]+\})
